<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthese</title>
    
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
</head>
<body>
    <div class="container">
<header class="brand-header">
            <div class="logo-container">
                <img src="logo.png" alt="Synthese Logo" class="brand-logo">
                <h1>Synthese</h1>
            </div>
            <p>Upload a document. Ask a question. Extract the context.</p>
        </header>

        <div id="error-banner" class="hidden"></div>

        <div class="card" id="upload-section">
            <h2>1. Upload Document</h2>
            <form id="upload-form">
                <label for="pdf-file">Select a PDF file:</label>
                <input type="file" id="pdf-file" accept="application/pdf" required>
                <button type="submit" id="upload-btn" class="global-btn">Upload PDF</button>
            </form>
            <p id="upload-status" class="hidden success-text"></p>
        </div>

        <div class="card hidden" id="query-section">
            <h2>2. Ask a Question</h2>
            <form id="query-form">
                <input type="hidden" id="doc-id">
                <label for="question">What would you like to know?</label>
                <input type="text" id="question" placeholder="e.g., What is the main conclusion?" required>
                <button type="submit" id="query-btn" class="global-btn">Synthesize Answer</button>
            </form>
        </div>

        <div class="card hidden response-card" id="response-section">
            <h2>Synthesis</h2>
            <div id="answer-text" class="content-box"></div>
            
            <h3 class="sources-title">Retrieved Context</h3>
            <div id="sources-container"></div>
        </div>
    </div>
</body>
</html>
